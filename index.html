<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace de Addons Bedrock</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 20px;
            background-color: #2e7d32;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }
        .card {
            background-color: #2d2d2d;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            text-align: center;
            border: 1px solid #444;
        }
        .card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 6px;
        }
        .card h3 {
            margin: 10px 0 5px 0;
            color: #4caf50;
        }
        .card p {
            font-size: 14px;
            color: #ccc;
            height: 40px;
            overflow: hidden;
        }
        .btn-download {
            display: inline-block;
            background-color: #4caf50;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 10px;
            transition: background 0.3s;
        }
        .btn-download:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>MineBedrock Addons Store</h1>
        <p>Descarga los mejores complementos para Minecraft Bedrock</p>
    </header>

    <main class="grid">
        <div class="card">
            <img src="imagenes/addon1.jpg" alt="Imagen del Addon">
            <h3>Nombre del Addon Genial</h3>
            <p>Descripción breve de lo que hace tu addon en el juego.</p>
            <a href="addons/mi_addon_1.mcaddon" class="btn-download" download>Descargar .mcaddon</a>
        </div>

        </main>
</div>

</body>
  </html>
